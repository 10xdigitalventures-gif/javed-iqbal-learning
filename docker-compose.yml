version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: consult_hub
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/consult_hub?schema=public
      JWT_SECRET: change-me-in-production
      PUBLIC_WEB_URL: https://app.mentoringhub.online
      PUBLIC_API_URL: https://api.mentoringhub.online/api
      UPLOAD_DIR: /app/uploads
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: https://api.mentoringhub.online/api
    ports:
      - "3000:3000"

volumes:
  db_data:
  uploads:
