# ============================================================
#  Javed Iqbal Learning Platform - Nginx reverse proxy (WINDOWS)
#
#  Install location : C:\nginx\conf\sites\javed-iqbal.conf
#  Then inside      : C:\nginx\conf\nginx.conf  ->  http { ... }
#  add this line    : include sites/javed-iqbal.conf;
#
#  Replace  yourdomain.com  with your real domain everywhere below.
#  Routing:
#    app.yourdomain.com          -> Next.js web        (127.0.0.1:3000)
#    api.yourdomain.com          -> NestJS backend     (127.0.0.1:4000)
#    marketplace.yourdomain.com  -> Next.js marketplace(127.0.0.1:3001)
# ============================================================

upstream jil_web         { server 127.0.0.1:3000; keepalive 32; }
upstream jil_api         { server 127.0.0.1:4000; keepalive 32; }
upstream jil_marketplace { server 127.0.0.1:3001; keepalive 32; }

# ---------- HTTP :80  ->  ACME challenge + redirect to HTTPS ----------
server {
    listen 80;
    server_name app.yourdomain.com api.yourdomain.com marketplace.yourdomain.com;

    # win-acme / certbot http-01 challenge files are served from here
    location /.well-known/acme-challenge/ {
        root C:/nginx/webroot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- app.yourdomain.com  ->  web (Next.js) ----------
server {
    listen 443 ssl;
    http2 on;
    server_name app.yourdomain.com;

    ssl_certificate     C:/certs/app.yourdomain.com/fullchain.pem;
    ssl_certificate_key C:/certs/app.yourdomain.com/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://jil_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# ---------- api.yourdomain.com  ->  backend (NestJS) ----------
server {
    listen 443 ssl;
    http2 on;
    server_name api.yourdomain.com;

    ssl_certificate     C:/certs/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key C:/certs/api.yourdomain.com/privkey.pem;

    # allow large uploads (books, media, course files)
    client_max_body_size 512M;

    location / {
        proxy_pass http://jil_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

# ---------- marketplace.yourdomain.com  ->  marketplace (Next.js) ----------
server {
    listen 443 ssl;
    http2 on;
    server_name marketplace.yourdomain.com;

    ssl_certificate     C:/certs/marketplace.yourdomain.com/fullchain.pem;
    ssl_certificate_key C:/certs/marketplace.yourdomain.com/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://jil_marketplace;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
