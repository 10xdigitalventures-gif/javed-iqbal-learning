# ============================================================
#  Javed Iqbal Learning Platform - Nginx reverse proxy (LINUX / Hetzner VPS)
#
#  Install location : /etc/nginx/sites-available/javed-iqbal.conf
#  Enable           : sudo ln -s /etc/nginx/sites-available/javed-iqbal.conf \
#                                 /etc/nginx/sites-enabled/javed-iqbal.conf
#  Test + reload    : sudo nginx -t && sudo systemctl reload nginx
#
#  This is the SAME routing as windows-local.conf - only cert paths differ.
#  Get certs with:   sudo certbot --nginx -d app.yourdomain.com \
#                        -d api.yourdomain.com -d marketplace.yourdomain.com
#  (certbot will fill in the ssl_certificate lines automatically)
# ============================================================

upstream jil_web         { server 127.0.0.1:3000; keepalive 32; }
upstream jil_api         { server 127.0.0.1:4000; keepalive 32; }
upstream jil_marketplace { server 127.0.0.1:3001; keepalive 32; }

server {
    listen 80;
    server_name app.yourdomain.com api.yourdomain.com marketplace.yourdomain.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name app.yourdomain.com;
    ssl_certificate     /etc/letsencrypt/live/app.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.yourdomain.com/privkey.pem;
    client_max_body_size 100M;
    location / {
        proxy_pass http://jil_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.yourdomain.com;
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    client_max_body_size 512M;
    location / {
        proxy_pass http://jil_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name marketplace.yourdomain.com;
    ssl_certificate     /etc/letsencrypt/live/marketplace.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketplace.yourdomain.com/privkey.pem;
    client_max_body_size 100M;
    location / {
        proxy_pass http://jil_marketplace;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
